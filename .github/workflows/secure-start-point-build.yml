name: Secure start-point build

# Variant of secure-docker-build.yml for cyber-dojo start-point images, which are
# NOT built from a Dockerfile via docker/build-push-action but by running
# `cyber-dojo start-point create` (invoked here through the caller repo's
# `make image`). Because there is no buildkit build, the two things buildkit gave
# secure-docker-build.yml for free are produced explicitly instead:
#   - the SBOM: generated with syft against the built image (SPDX 2.3, same as
#     buildkit's embedded syft-scanner), rather than `sbom: true`.
#   - there is no SLSA provenance predicate (`provenance: mode=max`), so the
#     provenance decision is not given a provenance.json attachment.
# Everything downstream (Kosli attest artifact / provenance / sbom, the distill,
# evaluate and decision steps) is identical to secure-docker-build.yml. The SBOM
# block is deliberately a copy for now; it can be factored into a shared workflow
# later.

on:
  workflow_call:
    outputs:
      digest:
        description: The SHA256 image digest
        value: ${{ jobs.secure-build.outputs.digest }}
      tagged_image_name:
        description: "eg 244531986313.dkr.ecr.eu-central-1.amazonaws.com/custom-start-points:52ec808"
        value: ${{ jobs.secure-build.outputs.tagged_image_name }}

    inputs:
      # inputs for actions/checkout@v6
      checkout_repository:
        required: true
        type: string        # eg cyberdojo/custom-start-points
      checkout_ref:
        required: true
        type: string        # eg ${{ github.sha }}
      checkout_fetch_depth:
        required: true
        type: string        # eg 1

      # the image `make image` builds and where it is pushed
      image_name:
        required: true
        type: string        # eg 244531986313.dkr.ecr.eu-central-1.amazonaws.com/custom-start-points
      image_tag:
        required: true
        type: string        # eg 52ec808
      local_image_name:
        required: false
        type: string        # the tag `make image` produces locally, before it is
        default: ""         # retagged to image_name (defaults to cyberdojo/<kosli_reference_name>)

      # inputs for Kosli CLI commands
      kosli_flow:
        required: true
        type: string
      kosli_trail:          # eg ${{ vars.KOSLI_FLOW }}
        required: true
        type: string        # eg ${{ inputs.KOSLI_TRAIL }}
      kosli_reference_name:
        required: true
        type: string        # eg custom-start-points

      attest_to_kosli:
        required: false
        type: boolean       # eg ${{ github.ref == 'refs/heads/main' }}
        default: true
      kosli_cli_version:
        required: false
        type: string
        default: ${{ vars.KOSLI_CLI_VERSION }}
      kosli_debug:
        required: false
        type: string
        default: ${{ vars.KOSLI_DEBUG }}
      kosli_dry_run:
        required: false
        type: string
        default: ${{ vars.KOSLI_DRY_RUN }}
      kosli_host:
        required: false
        type: string
        default: ${{ vars.KOSLI_HOST }}
      kosli_org:
        required: false
        type: string
        default: ${{ vars.KOSLI_ORG }}

    secrets:
      kosli_api_token:
        required: true


env:
  KOSLI_API_TOKEN: ${{ secrets.kosli_api_token }}
  KOSLI_DEBUG:     ${{ inputs.kosli_debug }}          # true/false
  KOSLI_DRY_RUN:   ${{ inputs.kosli_dry_run }}        # true/false
  KOSLI_HOST:      ${{ inputs.kosli_host }}           # https://app.kosli.com
  KOSLI_ORG:       ${{ inputs.kosli_org }}            # cyber-dojo
  KOSLI_FLOW:      ${{ inputs.kosli_flow }}           # custom-start-points-ci
  KOSLI_TRAIL:     ${{ inputs.kosli_trail }}

  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_REGION:     ${{ vars.AWS_REGION }}

jobs:

  secure-build:
    needs: []
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.sanitize-digest.outputs.digest }}
      tagged_image_name: ${{ inputs.image_name }}:${{ inputs.image_tag }}
    permissions:
      id-token: write
      contents: write
      attestations: write
      artifact-metadata: write
    env:
      REGO_POLICY_FILENAME:      SDLC-CTRL-0002-binary-provenance.rego
      REGO_POLICY_URL:           https://raw.githubusercontent.com/cyber-dojo/reusable-actions-workflows/refs/heads/main/SDLC-CTRL-0002-binary-provenance.rego
      SBOM_REGO_POLICY_FILENAME: SDLC-CTRL-0004-sbom.rego
      SBOM_REGO_POLICY_URL:      https://raw.githubusercontent.com/cyber-dojo/reusable-actions-workflows/refs/heads/main/SDLC-CTRL-0004-sbom.rego
      SBOM_FACTS_JQ_FILENAME:    sbom-facts.jq
      SBOM_FACTS_JQ_URL:         https://raw.githubusercontent.com/cyber-dojo/reusable-actions-workflows/refs/heads/main/sbom-facts.jq
      SBOM_EXCEPTIONS_FILENAME:  sbom-exceptions.${{ inputs.kosli_reference_name }}.json
      SBOM_EXCEPTIONS_URL:       https://raw.githubusercontent.com/cyber-dojo/reusable-actions-workflows/refs/heads/main/sbom-exceptions.${{ inputs.kosli_reference_name }}.json
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/gh_actions_services
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 2400
          role-session-name: ${{ github.event.repository.name }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.checkout_repository }}
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: ${{ inputs.checkout_fetch_depth }}

      # Build via `cyber-dojo start-point create` (through the caller's `make image`),
      # then retag the locally-built image to the ECR name and push it. `make image`
      # self-provisions the cyber-dojo CLI, so no extra setup is needed.
      - name: Build start-point image and push to Amazon ECR
        id: docker_build
        run: |
          git fetch origin main:main || true
          make image
          LOCAL_IMAGE="${{ inputs.local_image_name }}"
          if [ -z "${LOCAL_IMAGE}" ]; then
            LOCAL_IMAGE="cyberdojo/${{ inputs.kosli_reference_name }}"
          fi
          docker tag "${LOCAL_IMAGE}:${{ inputs.image_tag }}" "${{ inputs.image_name }}:${{ inputs.image_tag }}"
          docker push "${{ inputs.image_name }}:${{ inputs.image_tag }}" | tee /tmp/docker-push.log
          DIGEST="$(grep -oE 'sha256:[0-9a-f]{64}' /tmp/docker-push.log | head -1)"
          echo "digest=${DIGEST}" >> ${GITHUB_OUTPUT}

      - name: Sanitize digest
        id: sanitize-digest
        run: |
          DIGEST=$(echo ${{ steps.docker_build.outputs.digest }} | sed 's/^sha256://')
          echo "DIGEST=${DIGEST}" >> ${GITHUB_ENV}
          echo "digest=${DIGEST}" >> ${GITHUB_OUTPUT}

      - name: Save Docker image ready to upload
        run: |
          docker pull ${{ inputs.image_name }}:${{ inputs.image_tag }}
          docker image save ${{ inputs.image_name }}:${{ inputs.image_tag }} --output ${{ runner.temp }}/${{ env.DIGEST }}.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.DIGEST }}
          path: ${{ runner.temp }}/${{ env.DIGEST }}.tar

      # syft replaces buildkit's embedded scanner: it scans the finished image and
      # emits SPDX 2.3 JSON, identical in shape to `sbom: true`. syft does not care
      # that the image was not built from a Dockerfile.
      - name: Get SBOM file
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.image_name }}:${{ inputs.image_tag }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest Build Provenance
        id: artifact-gh-attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ inputs.image_name }}
          subject-digest: sha256:${{ env.DIGEST }}
          push-to-registry: true

      - name: Make artifact GH sigstore attestation index available to next steps
        run: |
          TRANSPARENCY_LOG_INDEX=$(jq '.verificationMaterial.tlogEntries[0].logIndex' ${{ steps.artifact-gh-attest.outputs.bundle-path }})
          echo "ARTIFACT_TLOG_INDEX=${TRANSPARENCY_LOG_INDEX}" >> ${GITHUB_ENV}
          # The GitHub-generated sigstore bundle carries the SLSA provenance predicate;
          # attach it to the provenance decision in place of a buildkit provenance.json.
          cp "${{ steps.artifact-gh-attest.outputs.bundle-path }}" github-provenance.json

      - name: Attest SBOM to Github
        id: sbom-gh-attest
        uses: actions/attest@v4
        with:
          sbom-path: 'sbom.spdx.json'
          subject-name: ${{ inputs.image_name }}
          subject-digest: sha256:${{ env.DIGEST }}

      - name: Make sbom GH sigstore attestation index available to next steps
        run: |
          TRANSPARENCY_LOG_INDEX=$(jq '.verificationMaterial.tlogEntries[0].logIndex' ${{ steps.sbom-gh-attest.outputs.bundle-path }})
          echo "SBOM_TLOG_INDEX=${TRANSPARENCY_LOG_INDEX}" >> ${GITHUB_ENV}

      - name: Show workflow details
        run: |
          echo "Workflow     => ${{ github.workflow }}"
          echo "Workflow ref => ${{ github.workflow_ref }}"
          echo "Workflow sha => ${{ github.workflow_sha }}"

      - name: Setup Kosli CLI
        if: ${{ success() || failure() }}
        uses: kosli-dev/setup-cli-action@v5
        with:
          version: ${{ inputs.kosli_cli_version }}

      - name: Attest artifact to Kosli
        if: ${{ inputs.attest_to_kosli == true && (success() || failure()) }}
        run:
          kosli attest artifact ${{ inputs.image_name }}:${{ inputs.image_tag }}
            --annotate type=build
            --fingerprint ${{ env.DIGEST }}
            --name ${{ inputs.kosli_reference_name }}

      - name: Evaluate
        if: ${{ inputs.attest_to_kosli == true && (success() || failure()) }}
        id: evaluate
        run: |
          curl --fail-with-body "${REGO_POLICY_URL}" > "${REGO_POLICY_FILENAME}"
          PARAMS='{"artifact_name": "${{ inputs.kosli_reference_name }}"}'
          kosli evaluate trail ${{inputs.kosli_trail}} \
            --policy "${REGO_POLICY_FILENAME}" \
            --params "${PARAMS}" \
            --no-assert \
            --output json > eval-report.json
          echo "compliant=$(jq -r '.allow' eval-report.json)" >> "${GITHUB_OUTPUT}"
          params="${PARAMS}"
          jq --argjson params "$params" '{params: $params, allow: .allow, violations: .violations}' eval-report.json > eval-evidence.json

      - name: Attest SDLC-CTRL-0002 decision
        if: ${{ inputs.attest_to_kosli == true && (success() || failure()) }}
        run:
          kosli attest decision
            --control SDLC-CTRL-0002
            --compliant=${{ steps.evaluate.outputs.compliant }}
            --name provenance
            --fingerprint ${{ env.DIGEST }}
            --attachments "${REGO_POLICY_FILENAME}"
            --attachments github-provenance.json
            --external-url github-attestation=${{ steps.artifact-gh-attest.outputs.attestation-url }}
            --external-url github-sigstore=https://search.sigstore.dev/?logIndex=${{ env.ARTIFACT_TLOG_INDEX }}
            --user-data eval-evidence.json

      # Distill the SPDX document into the small rego-friendly facts contract that
      # SDLC-CTRL-0004-sbom.rego evaluates (rego cannot read the raw SPDX blob).
      # The distill filter is shared with the repo's rego tests as a single source
      # of truth; see sbom-facts.jq for the contract and the SPDX handling notes.
      - name: Distill SBOM facts
        run: |
          curl --fail-with-body "${SBOM_FACTS_JQ_URL}" > "${SBOM_FACTS_JQ_FILENAME}"
          jq -f "${SBOM_FACTS_JQ_FILENAME}" sbom.spdx.json > sbom-facts.json

      - name: Attest SBOM facts to Kosli
        if: ${{ inputs.attest_to_kosli == true && (success() || failure()) }}
        run:
          kosli attest custom
            --type sbom-facts
            --name sbom-facts
            --fingerprint ${{ env.DIGEST }}
            --attestation-data sbom-facts.json

      - name: Evaluate SBOM against SDLC-CTRL-0004
        if: ${{ inputs.attest_to_kosli == true && (success() || failure()) }}
        id: evaluate-sbom
        run: |
          curl --fail-with-body "${SBOM_REGO_POLICY_URL}" > "${SBOM_REGO_POLICY_FILENAME}"
          # Per-service exceptions allow-list. A missing file means no exceptions,
          # which is stricter (fail toward non-compliance), so tolerate a 404.
          if ! curl --fail-with-body "${SBOM_EXCEPTIONS_URL}" > "${SBOM_EXCEPTIONS_FILENAME}"; then
            echo "no exceptions file for ${{ inputs.kosli_reference_name }}; evaluating with none"
            echo '{"exceptions": []}' > "${SBOM_EXCEPTIONS_FILENAME}"
          fi

          PARAMS=$(jq -n \
            --arg an "${{ inputs.kosli_reference_name }}" \
            --arg now "$(date -u +%Y-%m-%d)" \
            --slurpfile exc "${SBOM_EXCEPTIONS_FILENAME}" \
            '{artifact_name: $an, sbom_attestation_name: "sbom-facts", min_packages: 1, allowed_spec_versions: ["SPDX-2.3"], now: $now, exceptions: ($exc[0].exceptions // [])}')

          kosli evaluate trail ${{inputs.kosli_trail}} \
            --policy "${SBOM_REGO_POLICY_FILENAME}" \
            --params "${PARAMS}" \
            --no-assert \
            --output json > sbom-eval-report.json
          echo "compliant=$(jq -r '.allow' sbom-eval-report.json)" >> "${GITHUB_OUTPUT}"
          jq --argjson params "${PARAMS}" '{params: $params, allow: .allow, violations: .violations}' sbom-eval-report.json > sbom-eval-evidence.json

      - name: Attest SDLC-CTRL-0004 decision
        if: ${{ inputs.attest_to_kosli == true && (success() || failure()) }}
        run:
          kosli attest decision
            --control SDLC-CTRL-0004
            --compliant=${{ steps.evaluate-sbom.outputs.compliant }}
            --name sbom-decision
            --fingerprint ${{ env.DIGEST }}
            --attachments sbom.spdx.json
            --attachments "${SBOM_REGO_POLICY_FILENAME}"
            --attachments "${SBOM_EXCEPTIONS_FILENAME}"
            --external-url github-attestation=${{ steps.sbom-gh-attest.outputs.attestation-url }}
            --external-url github-sigstore=https://search.sigstore.dev/?logIndex=${{ env.SBOM_TLOG_INDEX }}
            --user-data sbom-eval-evidence.json
