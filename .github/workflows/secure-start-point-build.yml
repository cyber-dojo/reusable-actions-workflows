name: Secure start-point build

# Variant of secure-docker-build.yml for cyber-dojo start-point images, which are
# NOT built from a Dockerfile via docker/build-push-action but by running
# `cyber-dojo start-point create` (invoked here through the caller repo's
# `make image`). Because there is no buildkit build, the two things buildkit gave
# secure-docker-build.yml for free are produced explicitly instead:
#   - the SBOM: generated with syft against the built image (SPDX 2.3, same as
#     buildkit's embedded syft-scanner), rather than `sbom: true`.
#   - there is no SLSA provenance predicate (`provenance: mode=max`), so the
#     provenance decision is not given a provenance.json attachment.
# Everything downstream (Kosli attest artifact / provenance / sbom, the distill,
# evaluate and decision steps) is shared with secure-docker-build.yml through the
# attest-and-evaluate composite action.

on:
  workflow_call:
    outputs:
      digest:
        description: The SHA256 image digest
        value: ${{ jobs.secure-build.outputs.digest }}
      tagged_image_name:
        description: "eg 244531986313.dkr.ecr.eu-central-1.amazonaws.com/custom-start-points:52ec808"
        value: ${{ jobs.secure-build.outputs.tagged_image_name }}

    inputs:
      # inputs for actions/checkout@v6
      checkout_repository:
        required: true
        type: string        # eg cyberdojo/custom-start-points
      checkout_ref:
        required: true
        type: string        # eg ${{ github.sha }}
      checkout_fetch_depth:
        required: true
        type: string        # eg 1

      # the image `make image` builds and where it is pushed
      image_name:
        required: true
        type: string        # eg 244531986313.dkr.ecr.eu-central-1.amazonaws.com/custom-start-points
      image_tag:
        required: true
        type: string        # eg 52ec808
      local_image_name:
        required: false
        type: string        # the tag `make image` produces locally, before it is
        default: ""         # retagged to image_name (defaults to cyberdojo/<kosli_reference_name>)

      # inputs for Kosli CLI commands
      kosli_flow:
        required: true
        type: string
      kosli_trail:          # eg ${{ vars.KOSLI_FLOW }}
        required: true
        type: string        # eg ${{ inputs.KOSLI_TRAIL }}
      kosli_reference_name:
        required: true
        type: string        # eg custom-start-points

      attest_to_kosli:
        required: false
        type: boolean       # eg ${{ github.ref == 'refs/heads/main' }}
        default: true
      kosli_cli_version:
        required: false
        type: string
        default: ${{ vars.KOSLI_CLI_VERSION }}
      kosli_debug:
        required: false
        type: string
        default: ${{ vars.KOSLI_DEBUG }}
      kosli_dry_run:
        required: false
        type: string
        default: ${{ vars.KOSLI_DRY_RUN }}
      kosli_host:
        required: false
        type: string
        default: ${{ vars.KOSLI_HOST }}
      kosli_org:
        required: false
        type: string
        default: ${{ vars.KOSLI_ORG }}

    secrets:
      kosli_api_token:
        required: true


env:
  KOSLI_API_TOKEN: ${{ secrets.kosli_api_token }}
  KOSLI_DEBUG:     ${{ inputs.kosli_debug }}          # true/false
  KOSLI_DRY_RUN:   ${{ inputs.kosli_dry_run }}        # true/false
  KOSLI_HOST:      ${{ inputs.kosli_host }}           # https://app.kosli.com
  KOSLI_ORG:       ${{ inputs.kosli_org }}            # cyber-dojo
  KOSLI_FLOW:      ${{ inputs.kosli_flow }}           # custom-start-points-ci
  KOSLI_TRAIL:     ${{ inputs.kosli_trail }}

  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_REGION:     ${{ vars.AWS_REGION }}

jobs:

  secure-build:
    needs: []
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.sanitize-digest.outputs.digest }}
      tagged_image_name: ${{ inputs.image_name }}:${{ inputs.image_tag }}
    permissions:
      id-token: write
      contents: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Run rego policy tests as a build gate
        uses: cyber-dojo/reusable-actions-workflows/.github/actions/run-rego-tests@main
        with:
          kosli_cli_version: ${{ inputs.kosli_cli_version }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/gh_actions_services
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 2400
          role-session-name: ${{ github.event.repository.name }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.checkout_repository }}
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: ${{ inputs.checkout_fetch_depth }}

      # Build via `cyber-dojo start-point create` (through the caller's `make image`),
      # then retag the locally-built image to the ECR name and push it. `make image`
      # self-provisions the cyber-dojo CLI, so no extra setup is needed.
      - name: Build start-point image and push to Amazon ECR
        id: docker_build
        run: |
          git fetch origin main:main || true
          make image
          LOCAL_IMAGE="${{ inputs.local_image_name }}"
          if [ -z "${LOCAL_IMAGE}" ]; then
            LOCAL_IMAGE="cyberdojo/${{ inputs.kosli_reference_name }}"
          fi
          docker tag "${LOCAL_IMAGE}:${{ inputs.image_tag }}" "${{ inputs.image_name }}:${{ inputs.image_tag }}"
          docker push "${{ inputs.image_name }}:${{ inputs.image_tag }}" | tee /tmp/docker-push.log
          DIGEST="$(grep -oE 'sha256:[0-9a-f]{64}' /tmp/docker-push.log | head -1)"
          echo "digest=${DIGEST}" >> ${GITHUB_OUTPUT}

      - name: Sanitize digest
        id: sanitize-digest
        run: |
          DIGEST=$(echo ${{ steps.docker_build.outputs.digest }} | sed 's/^sha256://')
          echo "DIGEST=${DIGEST}" >> ${GITHUB_ENV}
          echo "digest=${DIGEST}" >> ${GITHUB_OUTPUT}

      - name: Save Docker image ready to upload
        run: |
          docker pull ${{ inputs.image_name }}:${{ inputs.image_tag }}
          docker image save ${{ inputs.image_name }}:${{ inputs.image_tag }} --output ${{ runner.temp }}/${{ env.DIGEST }}.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.DIGEST }}
          path: ${{ runner.temp }}/${{ env.DIGEST }}.tar

      # syft replaces buildkit's embedded scanner: it scans the finished image and
      # emits SPDX 2.3 JSON, identical in shape to `sbom: true`. syft does not care
      # that the image was not built from a Dockerfile.
      - name: Get SBOM file
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.image_name }}:${{ inputs.image_tag }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      # Attest the image and SBOM to GitHub and Kosli, distill provenance and
      # SBOM facts, evaluate them against SDLC-CTRL-0002 and SDLC-CTRL-0004, and
      # attest the two decisions. Shared with secure-docker-build.yml. Reads
      # sbom.spdx.json, ${{ env.DIGEST }} and the KOSLI_* env vars set above.
      - name: Attest and evaluate
        if: ${{ success() || failure() }}
        uses: cyber-dojo/reusable-actions-workflows/.github/actions/attest-and-evaluate@main
        with:
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ inputs.image_tag }}
          kosli_reference_name: ${{ inputs.kosli_reference_name }}
          digest: ${{ env.DIGEST }}
          attest_to_kosli: ${{ inputs.attest_to_kosli }}
          kosli_cli_version: ${{ inputs.kosli_cli_version }}
