name: Secure docker build

on:
  workflow_call:
    outputs:
      digest:
        description: The SHA256 image digest
        value: ${{ jobs.secure-build.outputs.digest }}
      tagged_image_name:
        description: "eg 244531986313.dkr.ecr.eu-central-1.amazonaws.com/differ:52ec808"
        value: ${{ jobs.secure-build.outputs.tagged_image_name }}

    inputs:
      # inputs for actions/checkout@v6
      checkout_repository:
        required: true
        type: string        # eg cyberdojo/differ
      checkout_ref:
        required: true
        type: string        # eg ${{ github.sha }}
      checkout_fetch_depth:
        required: true
        type: string        # eg 1

      # inputs for docker/build-push-action@v7
      image_name:
        required: true
        type: string        # eg 244531986313.dkr.ecr.eu-central-1.amazonaws.com/differ
      image_tag:
        required: true
        type: string        # eg 52ec808
      image_build_args:
        required: false
        type: string
      build_context:
        required: false
        type: string        # eg services/foo (defaults to repo root)
        default: .
      dockerfile:
        required: false
        type: string        # eg services/foo/Dockerfile (defaults to ./Dockerfile)
        default: ./Dockerfile

      # inputs for Kosli CLI commands
      kosli_flow:
        required: true
        type: string
      kosli_trail:          # eg ${{ vars.KOSLI_FLOW }}
        required: true
        type: string        # eg ${{ inputs.KOSLI_TRAIL }}
      kosli_reference_name:
        required: true
        type: string        # eg saver

      attest_to_kosli:
        required: false
        type: boolean       # eg ${{ github.ref == 'refs/heads/main' }}
        default: true
      kosli_cli_version:
        required: false
        type: string
        default: ${{ vars.KOSLI_CLI_VERSION }}
      kosli_debug:
        required: false
        type: string
        default: ${{ vars.KOSLI_DEBUG }}
      kosli_dry_run:
        required: false
        type: string
        default: ${{ vars.KOSLI_DRY_RUN }}
      kosli_host:
        required: false
        type: string
        default: ${{ vars.KOSLI_HOST }}
      kosli_org:
        required: false
        type: string
        default: ${{ vars.KOSLI_ORG }}

    secrets:
      kosli_api_token:
        required: true


env:
  KOSLI_API_TOKEN: ${{ secrets.kosli_api_token }}
  KOSLI_DEBUG:     ${{ inputs.kosli_debug }}          # true/false
  KOSLI_DRY_RUN:   ${{ inputs.kosli_dry_run }}        # true/false
  KOSLI_HOST:      ${{ inputs.kosli_host }}           # https://app.kosli.com
  KOSLI_ORG:       ${{ inputs.kosli_org }}            # cyber-dojo
  KOSLI_FLOW:      ${{ inputs.kosli_flow }}           # saver-ci
  KOSLI_TRAIL:     ${{ inputs.kosli_trail }}

  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_REGION:     ${{ vars.AWS_REGION }}

jobs:

  # Gate the build on this repo's own rego policy tests. Runs before secure-build
  # (which needs: it), so a broken policy fails here before any image is built or
  # pushed. The tests need jq (preinstalled) and the kosli CLI; they call
  # `kosli evaluate input`, which makes no API calls, so no token is required.
  test-policies:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout reusable-actions-workflows
        uses: actions/checkout@v6
        with:
          repository: cyber-dojo/reusable-actions-workflows
          ref: main

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v5
        with:
          version: ${{ inputs.kosli_cli_version }}

      - name: Run rego policy tests
        shell: bash
        run: tests/run_tests.sh

  secure-build:
    needs: test-policies
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.sanitize-digest.outputs.digest }}
      tagged_image_name: ${{ inputs.image_name }}:${{ inputs.image_tag }}
    permissions:
      id-token: write
      contents: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/gh_actions_services
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 2400
          role-session-name: ${{ github.event.repository.name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.checkout_repository }}
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: ${{ inputs.checkout_fetch_depth }}

      - name: Build and push Docker image to Amazon ECR
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          no-cache: true
          push: true
          tags: ${{ inputs.image_name }}:${{ inputs.image_tag }}
          build-args: ${{ inputs.image_build_args }}
          provenance: mode=max
          sbom: true

      - name: Sanitize digest
        id: sanitize-digest
        run: |
          DIGEST=$(echo ${{ steps.docker_build.outputs.digest }} | sed 's/^sha256://')
          echo "DIGEST=${DIGEST}" >> ${GITHUB_ENV}
          echo "digest=${DIGEST}" >> ${GITHUB_OUTPUT}

      - name: Save Docker image ready to upload
        run: |          
          docker pull ${{ inputs.image_name }}:${{ inputs.image_tag }}
          docker image save ${{ inputs.image_name }}:${{ inputs.image_tag }} --output ${{ runner.temp }}/${{ env.DIGEST }}.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.DIGEST }}
          path: ${{ runner.temp }}/${{ env.DIGEST }}.tar

      - name: Get SBOM file
        run:
          docker buildx imagetools inspect ${{ inputs.image_name }}@${{ steps.docker_build.outputs.digest }}
            --format "{{ json .SBOM.SPDX }}" > sbom.spdx.json

      # Attest the image and SBOM to GitHub and Kosli, distill provenance and
      # SBOM facts, evaluate them against SDLC-CTRL-0002 and SDLC-CTRL-0004, and
      # attest the two decisions. Shared with secure-start-point-build.yml. Reads
      # sbom.spdx.json, ${{ env.DIGEST }} and the KOSLI_* env vars set above.
      - name: Attest and evaluate
        if: ${{ success() || failure() }}
        uses: cyber-dojo/reusable-actions-workflows/.github/actions/attest-and-evaluate@main
        with:
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ inputs.image_tag }}
          kosli_reference_name: ${{ inputs.kosli_reference_name }}
          digest: ${{ env.DIGEST }}
          attest_to_kosli: ${{ inputs.attest_to_kosli }}
          kosli_cli_version: ${{ inputs.kosli_cli_version }}
